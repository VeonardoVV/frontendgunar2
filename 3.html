<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Editar Productos</title>
  <link rel="stylesheet" href="3.css">
</head>
<body>
<div class="container">
  <div class="card">
    <h2>Editar Producto</h2>
    <form id="form-editar">
      <label>Nombre</label>
      <input type="text" id="nombre">
      <label>Precio</label>
      <input type="number" id="precio" step="0.01">
      <label>Stock</label>
      <input type="number" id="stock">
      <label>Categoría</label>
      <select id="categoria"></select>
      <div class="buttons">
        <button type="submit" class="btn primary">Guardar</button>
        <a href="index.html">
          <button type="button" class="btn secondary">Volver</button>
        </a>
      </div>
    </form>
  </div>
</div>
<script>
const API_URL = "https://backendgunar-1.onrender.com/productos";
const API_CATEGORIAS = "https://backendgunar-1.onrender.com/categorias";
const id = new URLSearchParams(window.location.search).get("id");
const select = document.getElementById("categoria");

async function cargarCategorias() {
  const res = await fetch(API_CATEGORIAS);
  const data = await res.json();
  select.innerHTML = "";
  data.forEach(c => {
    select.innerHTML += `<option value="${c.id}">${c.nombre}</option>`;
  });
}

async function cargarProducto() {
  const res = await fetch(`${API_URL}/${id}`);
  const p = await res.json();
  document.getElementById("nombre").value = p.nombre;
  document.getElementById("precio").value = p.precio;
  document.getElementById("stock").value = p.stock;
  select.value = p.categoria_id;
}

document.getElementById("form-editar").addEventListener("submit", async (e) => {
  e.preventDefault();
  const body = {
    nombre: document.getElementById("nombre").value.trim(),
    precio: Number(document.getElementById("precio").value),
    stock: Number(document.getElementById("stock").value),
    categoria_id: Number(select.value)
  };
  await fetch(`${API_URL}/${id}`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body)
  });
  alert("Actualizado 🚀");
  location.href = "index.html";
});

async function init() {
  await cargarCategorias();
  await cargarProducto();
}

init();
</script>
</body>
</html>
