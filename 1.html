<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Agregar Productos</title>
    <link rel="stylesheet" href="1.css">
</head>
<body>

<div class="container">
    <div class="card">
        <h1>Agregar Productos</h1>

        <form id="form-producto">

            <label>Nombre del Producto</label>
            <input type="text" id="nombre" required>

            <label>Precio</label>
            <input type="number" id="precio" step="0.01" required>

            <label>Stock</label>
            <input type="number" id="stock" required>

            <label>Categoría</label>
            <select id="categoria" required>
                <option value="">Cargando categorías...</option>
            </select>

            <div class="buttons">
                <button type="submit" class="btn" id="btnGuardar">Guardar</button>
                <a href="index.html">
                    <button type="button" class="btn">Volver</button>
                </a>
            </div>

        </form>
    </div>
</div>

<script>
const API_URL = "https://backendgunar-1.onrender.com/productos";
const API_CATEGORIAS = "https://backendgunar-1.onrender.com/categorias";

const form = document.getElementById("form-producto");
const btnGuardar = document.getElementById("btnGuardar");
const selectCategoria = document.getElementById("categoria");

/* =========================
   CARGAR CATEGORÍAS
========================= */
async function cargarCategorias() {
    try {
        const res = await fetch(API_CATEGORIAS);
        const data = await res.json();

        selectCategoria.innerHTML = `<option value="">Seleccione una categoría</option>`;

        data.forEach(cat => {
            selectCategoria.innerHTML += `
                <option value="${cat.id}">${cat.nombre}</option>
            `;
        });

    } catch (error) {
        console.error("Error cargando categorías:", error);
        selectCategoria.innerHTML = `<option value="">Error al cargar</option>`;
    }
}

cargarCategorias();

/* =========================
   GUARDAR PRODUCTO
========================= */
form.addEventListener("submit", async (e) => {
    e.preventDefault();

    btnGuardar.disabled = true;
    btnGuardar.textContent = "Guardando...";

    const nuevoProducto = {
        nombre: document.getElementById("nombre").value.trim(),
        precio: Number(document.getElementById("precio").value),
        stock: Number(document.getElementById("stock").value),
        categoria_id: Number(document.getElementById("categoria").value),
        fecha: new Date().toISOString().split("T")[0]
    };

    try {
        const res = await fetch(API_URL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(nuevoProducto)
        });

        const data = await res.json();

        if (!res.ok) throw new Error("Error al guardar");

        alert("Producto agregado correctamente 🚀");
        window.location.href = "index.html";

    } catch (error) {
        console.error(error);
        alert("Error al guardar producto ❌");

    } finally {
        btnGuardar.disabled = false;
        btnGuardar.textContent = "Guardar";
    }
});
</script>

</body>
</html>
